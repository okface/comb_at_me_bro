<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Comb At Me Bro — Enemy Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --paper:#F5EBD6; --paper2:#E8DCBF; --ink:#3A2818; --inkSoft:#6B5A45; --rule:#C8C0AD; --sage:#C8D89A;}
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:'JetBrains Mono', monospace; padding:48px 56px 96px;}
  header{max-width:1200px; margin:0 auto 28px;}
  .eyebrow{font-size:11px; letter-spacing:0.18em; color:var(--inkSoft); text-transform:uppercase; margin:0 0 10px;}
  h1{font-family:'Fraunces',serif; font-weight:700; font-size:38px; margin:0 0 12px; letter-spacing:-0.01em;}
  .lede{font-size:12px; color:var(--inkSoft); margin:0; max-width:680px; line-height:1.6;}
  .grid{max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  .card{border:1px solid var(--ink); background:var(--paper); padding:14px;}
  .stage{height:160px; background:var(--sage); border:1px solid var(--ink); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;}
  .stage.boss{height:200px;}
  .stage.dying::after{content:''; position:absolute; inset:0; background: radial-gradient(circle, rgba(58,40,24,0.4) 0%, transparent 70%); animation: cb-puff 1.6s ease-out infinite;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
  .substage{height:90px; background:var(--paper2); border:1px solid var(--rule); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;}
  .substage .lbl{position:absolute; top:4px; left:6px; font-size:8.5px; letter-spacing:0.1em; color:var(--inkSoft);}
  h3{font-family:'Fraunces',serif; font-size:16px; margin:10px 0 4px;}
  .tier{display:inline-block; font-size:9px; padding:2px 6px; background:var(--ink); color:var(--paper); letter-spacing:0.08em;}
  .tier.boss{background:#A8351E;}
  .tier.mid{background:#B66B1E;}
  .tier.pest{background:#7E9658;}
  p{font-size:11px; color:var(--inkSoft); line-height:1.5; margin:6px 0 0;}
  footer{max-width:1200px; margin:48px auto 0; font-size:10.5px; color:var(--inkSoft); border-top:1px solid var(--rule); padding-top:18px;}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Subject 03 · Enemies · Threats</p>
  <h1>Enemy roster</h1>
  <p class="lede">Ten threats + bonus mites. Each card shows the live walk/fly cycle (left), the death animation (curl + ink-puff, right), and the gameplay-scale silhouette in the main stage.</p>
</header>

<div class="grid" id="grid"></div>

<footer>cb_at_me_bro · enemies v1 · all walk cycles + death animations live</footer>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="cb/style.jsx"></script>
<script type="text/babel" src="cb/anim.jsx"></script>
<script type="text/babel" src="cb/enemies.jsx"></script>

<script type="text/babel">
const { PAL, InkDefs } = window.CAMB;
const { AnimStyles } = window.CAMB_ANIM;
const { ENEMY_ROSTER } = window.CAMB_ENEMIES;

function EnemyMain({ Comp, size, isBoss }) {
  if (isBoss) return <Comp size={size}/>;
  return (
    <svg viewBox="0 0 64 64" width={size} height={size} style={{overflow:'visible', display:'block'}}>
      <Comp/>
    </svg>
  );
}

function Card({ e }) {
  const isBoss = e.tier==='boss' || e.size>=80;
  return (
    <div className="card">
      <div className={'stage ' + (isBoss?'boss':'')}>
        <div className="cb-bob"><EnemyMain Comp={e.Comp} size={e.size} isBoss={isBoss}/></div>
      </div>
      <div className="row2">
        <div className="substage">
          <span className="lbl">WALK</span>
          <div style={{animation:'cb-walk-2 0.4s steps(2) infinite'}}>
            <EnemyMain Comp={e.Comp} size={isBoss?64:Math.min(e.size, 56)} isBoss={isBoss}/>
          </div>
        </div>
        <div className="substage">
          <span className="lbl">DEATH</span>
          <div style={{animation:'cb-curl 2s ease-in infinite'}}>
            <EnemyMain Comp={e.Comp} size={isBoss?64:Math.min(e.size, 56)} isBoss={isBoss}/>
          </div>
        </div>
      </div>
      <h3>{e.name}</h3>
      <span className={'tier ' + e.tier}>{e.tier.toUpperCase()}</span>
      <p>{e.desc}</p>
    </div>
  );
}

function App() {
  return (
    <>
      <InkDefs/>
      <AnimStyles/>
      {ENEMY_ROSTER.map(e=> <Card key={e.id} e={e}/>)}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('grid')).render(<App/>);
</script>
</body>
</html>
