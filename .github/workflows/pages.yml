name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage Pages site (excludes handoff/, plans/, etc.)
        run: |
          mkdir -p _site
          cp index.html style.css _site/
          cp -r src _site/
          sha=${GITHUB_SHA::8}
          echo "Replacing __VERSION__ with $sha"
          sed -i "s/__VERSION__/$sha/g" \
            _site/index.html \
            _site/src/main.js \
            _site/src/game.js \
            _site/src/render.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
