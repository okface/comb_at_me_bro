<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Comb At Me Bro</title>
  <link rel="stylesheet" href="./style.css?v=__VERSION__" />
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-stack top-stack">
        <div class="hud-row top">
          <span id="wave-label">WAVE 1 / 5</span>
          <span id="hp-label">HP 100</span>
        </div>
        <div class="hud-row currency">
          <span class="pill" id="honey-pill">
            <span class="pill-glyph">🍯</span>
            <span id="honey-amount">50</span><span class="pill-cap">/<span id="honey-cap">250</span></span>
          </span>
          <span class="pill" id="larvae-pill">
            <span class="pill-glyph">🐝</span>
            <span id="larvae-amount">3</span>
          </span>
        </div>
      </div>
      <div class="hud-row bottom">
        <span id="status">tap READY to start</span>
        <button id="ready-btn" class="primary-btn">READY</button>
      </div>
    </div>
    <div id="overlay" class="hidden">
      <div class="overlay-card">
        <h1 id="overlay-title">Game Over</h1>
        <p id="overlay-sub">The hive has fallen.</p>
        <button id="overlay-btn">Restart</button>
      </div>
    </div>
    <div id="title-screen" class="title-overlay">
      <div class="title-card">
        <p class="title-eyebrow">Tower-Defense · Colony Management</p>
        <h1 class="title-name">Comb At Me Bro</h1>
        <p class="title-tagline">Defend the wild nest, queen.<br/>Survive the swarm.</p>
        <button id="title-play" class="primary-btn">PLAY</button>
        <p class="title-foot">a hand-drawn picture-book bee defense</p>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.js?v=__VERSION__"></script>
</body>
</html>
